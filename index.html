        const { useState, useMemo, useEffect, createElement: e } = React;

        const useCursor = () => {
            useEffect(() => {
                const fxContainer = document.createElement('div');
                fxContainer.style.position = 'fixed';
                fxContainer.style.inset = '0';
                fxContainer.style.pointerEvents = 'none';
                fxContainer.style.zIndex = '9998';
                document.body.appendChild(fxContainer);

                let lastMouseX = window.innerWidth / 2;
                let lastMouseY = window.innerHeight / 2;
                let lastTrailTime = 0;

                const createTrail = (x, y) => {
                    const petal = document.createElement('div');
                    petal.className = 'trail-petal';
                    petal.style.left = x + 'px';
                    petal.style.top = y + 'px';
                    fxContainer.appendChild(petal);

                    const rot = Math.random() * 60 - 30;
                    petal.style.transform = `translate(-50%, -50%) scale(0.8) rotate(${rot}deg)`;
                    petal.style.opacity = '0.7';

                    void petal.offsetWidth;

                    petal.style.transform = `translate(-50%, calc(-50% + 14px)) scale(0) rotate(${rot + 40}deg)`;
                    petal.style.opacity = '0';

                    setTimeout(() => { if (fxContainer.contains(petal)) petal.remove(); }, 600);
                };

                const createBloom = (x, y) => {
                    const numPetals = 5;
                    const radius = 8;
                    for (let i = 0; i < numPetals; i++) {
                        const petal = document.createElement('div');
                        petal.className = 'bloom-petal';
                        petal.style.left = x + 'px';
                        petal.style.top = y + 'px';

                        const angle = i * (360 / numPetals);
                        petal.style.transform = `translate(-50%, -50%) scale(0) rotate(${angle}deg)`;
                        fxContainer.appendChild(petal);

                        void petal.offsetWidth;

                        const tx = Math.cos(angle * Math.PI / 180) * radius;
                        const ty = Math.sin(angle * Math.PI / 180) * radius;
                        const finalRot = angle + 45;

                        petal.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(1.1) rotate(${finalRot}deg)`;
                        petal.style.opacity = '0';

                        setTimeout(() => { if (fxContainer.contains(petal)) petal.remove(); }, 500);
                    }
                };

                const onMouseMove = (ev) => {
                    lastMouseX = ev.clientX;
                    lastMouseY = ev.clientY;

                    const now = Date.now();
                    if (now - lastTrailTime > 40) {
                        createTrail(lastMouseX, lastMouseY);
                        lastTrailTime = now;
                    }
                };

                const onMouseDown = (ev) => {
                    createBloom(ev.clientX, ev.clientY);
                };

                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mousedown', onMouseDown);

                return () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mousedown', onMouseDown);
                    if (document.body.contains(fxContainer)) fxContainer.remove();
                };
            }, []);
        };
